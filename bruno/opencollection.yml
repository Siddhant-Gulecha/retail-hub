opencollection: 1.0.0

info:
  name: Retail-Engine endpoints
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
      disabled: true
  auth:
    type: bearer
    token: "{{jwt_token}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
