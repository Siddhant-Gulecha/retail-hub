info:
  name: createAddress
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/address/create"
  headers:
    - name: Authorization
      value: Bearer {{jwt_token}}
      disabled: true
  body:
    type: json
    data: |-
      {
          "addressLine": "123 Building",
          "city": "myCity",
          "state": "MyState",
          "pincode": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
