info:
  name: createProduct
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/products/create"
  body:
    type: json
    data: |-
      {
        "name": "Mouse",
        "description": "comfortable",
        "price": "100.0",
        "currency": "USD"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
